<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NumConv — Number System Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00ffc8;
      --accent2: #ff6b6b;
      --accent3: #ffd93d;
      --accent4: #6bcbff;
      --text: #e8e8f0;
      --muted: #555570;
      --card: #16161f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
      overflow-x: hidden;
    }

    /* Ambient grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,200,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,255,200,0.06) 0%, transparent 70%);
      top: -200px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 48px;
    }

    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      border: 1px solid rgba(0,255,200,0.3);
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 16px;
      background: rgba(0,255,200,0.05);
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -1px;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
      letter-spacing: 1px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
    }

    /* Input card */
    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .input-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .input-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .number-input {
      flex: 1;
      min-width: 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 2px;
    }

    .number-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,255,200,0.1);
    }

    .number-input::placeholder { color: var(--muted); }

    .base-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .base-btn {
      flex: 1;
      min-width: 80px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .base-btn:hover { border-color: var(--accent); color: var(--text); }

    .base-btn.active {
      background: rgba(0,255,200,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .base-btn .base-num {
      display: block;
      font-size: 1.4rem;
      font-weight: 700;
      color: inherit;
      margin-bottom: 2px;
    }

    /* Error */
    .error-msg {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--accent2);
      margin-top: 10px;
      min-height: 18px;
      transition: opacity 0.2s;
    }

    /* Results */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 500px) {
      .results-grid { grid-template-columns: 1fr; }
    }

    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      cursor: pointer;
    }

    .result-card:hover { transform: translateY(-2px); }

    .result-card.bin { --c: var(--accent); }
    .result-card.oct { --c: var(--accent3); }
    .result-card.dec { --c: var(--accent4); }
    .result-card.hex { --c: var(--accent2); }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--c);
    }

    .result-card:hover { border-color: var(--c); }

    .result-tag {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--c);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .copy-icon {
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .result-card:hover .copy-icon { opacity: 1; }

    .result-value {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      color: var(--text);
      word-break: break-all;
      line-height: 1.5;
      min-height: 28px;
    }

    .result-value.empty { color: var(--muted); }

    .copied-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #000;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 10px 22px;
      border-radius: 100px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .copied-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Bit display for binary */
    .bit-display {
      margin-top: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .bit-display-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .bits-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .bit {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.2s;
    }

    .bit.one {
      background: rgba(0,255,200,0.15);
      border: 1px solid rgba(0,255,200,0.4);
      color: var(--accent);
    }

    .bit.zero {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 48px;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<div class="glow"></div>

<header>
  <div class="badge">⬡ Utility Tool</div>
  <h1>Num<span>Conv</span></h1>
  <p class="subtitle">// Binary · Octal · Decimal · Hexadecimal</p>
</header>

<div class="container">

  <!-- Input Card -->
  <div class="input-card">
    <span class="input-label">// Enter Value</span>
    <div class="input-row">
      <input
        type="text"
        class="number-input"
        id="inputVal"
        placeholder="e.g. 255 or FF or 11111111"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    <div style="margin-top: 16px;">
      <span class="input-label">// Input Base</span>
      <div class="base-selector">
        <div class="base-btn active" data-base="2">
          <span class="base-num">2</span>Binary
        </div>
        <div class="base-btn" data-base="8">
          <span class="base-num">8</span>Octal
        </div>
        <div class="base-btn active-default" data-base="10">
          <span class="base-num">10</span>Decimal
        </div>
        <div class="base-btn" data-base="16">
          <span class="base-num">16</span>Hex
        </div>
      </div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Results -->
  <div class="results-grid">
    <div class="result-card bin" onclick="copyVal('bin')">
      <div class="result-tag">
        <span>Base-2 · Binary</span>
        <span class="copy-icon">⎘</span>
      </div>
      <div class="result-value empty" id="res-bin">—</div>
    </div>
    <div class="result-card oct" onclick="copyVal('oct')">
      <div class="result-tag">
        <span>Base-8 · Octal</span>
        <span class="copy-icon">⎘</span>
      </div>
      <div class="result-value empty" id="res-oct">—</div>
    </div>
    <div class="result-card dec" onclick="copyVal('dec')">
      <div class="result-tag">
        <span>Base-10 · Decimal</span>
        <span class="copy-icon">⎘</span>
      </div>
      <div class="result-value empty" id="res-dec">—</div>
    </div>
    <div class="result-card hex" onclick="copyVal('hex')">
      <div class="result-tag">
        <span>Base-16 · Hex</span>
        <span class="copy-icon">⎘</span>
      </div>
      <div class="result-value empty" id="res-hex">—</div>
    </div>
  </div>

  <!-- Bit Visualizer -->
  <div class="bit-display" id="bitDisplay" style="display:none;">
    <div class="bit-display-label">// 8-bit Visualizer</div>
    <div class="bits-row" id="bitsRow"></div>
  </div>

</div>

<div class="copied-toast" id="toast">Copied!</div>

<footer>
  <p>Made with ♥ for engineers &nbsp;·&nbsp; No APIs, No Database, Pure JS</p>
</footer>

<script>
  let currentBase = 2;
  let currentDecVal = null;

  const baseBtns = document.querySelectorAll('.base-btn');
  const inputEl = document.getElementById('inputVal');
  const errorEl = document.getElementById('errorMsg');

  // Set default to decimal
  setBase(10);

  baseBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      setBase(parseInt(btn.dataset.base));
      inputEl.focus();
      convert();
    });
  });

  function setBase(base) {
    currentBase = base;
    baseBtns.forEach(b => b.classList.toggle('active', parseInt(b.dataset.base) === base));
    // Update placeholder
    const placeholders = {2:'e.g. 11111111',8:'e.g. 377',10:'e.g. 255',16:'e.g. FF'};
    inputEl.placeholder = placeholders[base];
  }

  inputEl.addEventListener('input', convert);

  function convert() {
    const raw = inputEl.value.trim().toUpperCase();
    errorEl.textContent = '';
    currentDecVal = null;

    if (!raw) {
      resetResults();
      return;
    }

    // Validate characters
    const validChars = {2:/^[01]+$/,8:/^[0-7]+$/,10:/^\d+$/,16:/^[0-9A-F]+$/};
    if (!validChars[currentBase].test(raw)) {
      errorEl.textContent = `✗ Invalid character for base-${currentBase}`;
      resetResults();
      return;
    }

    const dec = parseInt(raw, currentBase);
    if (isNaN(dec)) { errorEl.textContent = '✗ Invalid number'; resetResults(); return; }
    if (dec > 2**32) { errorEl.textContent = '✗ Number too large (max 32-bit)'; resetResults(); return; }

    currentDecVal = dec;

    setResult('bin', dec.toString(2));
    setResult('oct', dec.toString(8));
    setResult('dec', dec.toString(10));
    setResult('hex', dec.toString(16).toUpperCase());

    // Bit display (show 8 or 16 bits)
    renderBits(dec);
  }

  function setResult(id, val) {
    const el = document.getElementById('res-' + id);
    el.textContent = val;
    el.classList.remove('empty');
  }

  function resetResults() {
    ['bin','oct','dec','hex'].forEach(id => {
      const el = document.getElementById('res-' + id);
      el.textContent = '—';
      el.classList.add('empty');
    });
    document.getElementById('bitDisplay').style.display = 'none';
    currentDecVal = null;
  }

  function renderBits(dec) {
    const bitDisplay = document.getElementById('bitDisplay');
    const bitsRow = document.getElementById('bitsRow');
    const label = bitDisplay.querySelector('.bit-display-label');

    let bits = dec.toString(2);
    let size = 8;
    if (dec > 255) size = 16;
    if (dec > 65535) size = 32;

    bits = bits.padStart(size, '0');
    label.textContent = `// ${size}-bit Visualizer`;

    bitsRow.innerHTML = '';
    bits.split('').forEach(b => {
      const div = document.createElement('div');
      div.className = 'bit ' + (b === '1' ? 'one' : 'zero');
      div.textContent = b;
      bitsRow.appendChild(div);
    });

    bitDisplay.style.display = 'block';
  }

  // Copy on click
  const resultMap = { bin: 'res-bin', oct: 'res-oct', dec: 'res-dec', hex: 'res-hex' };
  function copyVal(id) {
    const val = document.getElementById(resultMap[id]).textContent;
    if (val === '—') return;
    navigator.clipboard.writeText(val).then(() => showToast());
  }

  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }
</script>

</body>
</html>
